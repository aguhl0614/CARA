{% extends "base.html" %}
{% block content %}
<section style="max-width:360px;margin:60px auto;">
  <h2>Sign in</h2>
  {% if error %}<p class="bad">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/login">
    <label>Username</label>
    <input name="username" autofocus style="width:100%;margin-bottom:10px;">
    <label>Password</label>
    <input name="password" type="password" style="width:100%;margin-bottom:14px;">
    <button type="submit" style="width:100%;">Sign in</button>
  </form>
</section>
{% endblock %}
