<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CARA Admin</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background:#0f1115; color:#e6e6e6; }
    header { background:#161a22; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #232a36; }
    header h1 { font-size:18px; margin:0; }
    a { color:#8ab4f8; text-decoration:none; }
    main { max-width:1000px; margin:0 auto; padding:20px; }
    section { background:#161a22; border:1px solid #232a36; border-radius:10px; padding:16px 18px; margin-bottom:18px; }
    h2 { font-size:13px; margin:0 0 12px; color:#cdd6e3; text-transform:uppercase; letter-spacing:.05em; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #232a36; }
    th { color:#8a93a3; font-weight:600; }
    input, select, button { font:inherit; padding:7px 9px; border-radius:7px; border:1px solid #2c3442; background:#0f1115; color:#e6e6e6; }
    button { background:#2d6cdf; border-color:#2d6cdf; cursor:pointer; }
    button.secondary { background:transparent; border-color:#2c3442; }
    form.inline { display:inline; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:end; }
    .ok { color:#5fd38d; } .bad { color:#f08c8c; } .muted { color:#8a93a3; }
    label { display:block; font-size:12px; color:#8a93a3; margin-bottom:3px; }
    strong.prov { display:block; margin-bottom:6px; }
  </style>
</head>
<body>
  <header>
    <h1>CARA — Admin</h1>
    <nav>{% if admin %}<span class="muted">{{ admin }}</span> &nbsp;·&nbsp; <a href="/admin/logout">Log out</a>{% endif %}</nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
